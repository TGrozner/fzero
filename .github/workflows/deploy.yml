name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'TGrozner/neon-drift'
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build client
        run: npm run build
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
      - name: Deploy Worker
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler deploy
      - name: Deploy Pages
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler pages deploy dist --project-name=neon-drift --branch=main --commit-dirty=true
      - name: Smoke test (post-deploy)
        if: env.CLOUDFLARE_API_TOKEN != '' && vars.VITE_SERVER_URL != ''
        env:
          SMOKE_URL: ${{ vars.VITE_SERVER_URL }}
        run: node scripts/smoke-test.mjs
